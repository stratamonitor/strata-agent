name: Build and Release Strata

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: pytest

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: python:3.12-slim-bullseye
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install System Deps
      run: apt-get update && apt-get install -y binutils git
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Build Linux Binary
      run: python build.py
    
    - name: Compress Linux Binary
      run: |
        cd dist
        tar -czvf strata-agent-linux.tar.gz strata

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strata-agent-linux
        path: dist/strata-agent-linux.tar.gz
        retention-days: 5

  build-macos:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Build MacOS Binary
      run: python3 build.py

    - name: Compress MacOS Binary
      run: |
        cd dist
        tar -czvf strata-agent-macos.tar.gz strata

    - name: Upload MacOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strata-agent-macos
        path: dist/strata-agent-macos.tar.gz
        retention-days: 5

  build-windows:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Build Windows Binary
      run: python build.py
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: strata-agent-windows
        path: dist/strata-agent-windows.zip
        retention-days: 5

  release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true